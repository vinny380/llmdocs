# Serve project documentation: from repo root,
#   llmdocs serve --config docs/llmdocs.yaml --data-dir .llmdocs/project-docs
docs_dir: .
server:
  host: 127.0.0.1
  port: 8090
search:
  semantic_weight: 0.7
  keyword_weight: 0.3
  chunk_size: 500
embeddings:
  provider: local
  model: sentence-transformers/all-MiniLM-L6-v2
llms_txt:
  output_path: ./llms.txt
  manual_override: null
